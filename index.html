<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#0f172a;
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

.container{
max-width:480px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.08);
backdrop-filter:blur(6px);
border:1px solid rgba(255,255,255,.1);
border-radius:24px;
padding:20px;
margin-bottom:20px;
}

.profile-row{
display:flex;
align-items:center;
gap:16px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
}

h1{
font-size:28px;
font-weight:700;
}

p{
opacity:.8;
font-size:14px;
}

.social{
display:flex;
gap:12px;
margin-top:16px;
flex-wrap:wrap;
}

.social a{
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
border-radius:12px;
background:rgba(255,255,255,.08);
text-decoration:none;
color:#fff;
font-size:18px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-top:16px;
}

.grid img{
width:100%;
border-radius:16px;
display:block;
aspect-ratio:1/1;
object-fit:cover;
}

.footer{
text-align:center;
opacity:.6;
font-size:13px;
padding:10px 0;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#1e293b,transparent 40%),
radial-gradient(circle at bottom right,#0ea5e9,transparent 35%),
#020617;
z-index:-1;
}
</style>
