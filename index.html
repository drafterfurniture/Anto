<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:system-ui,-apple-system,sans-serif;
background:#020617;
color:#fff;
overflow-x:hidden;
min-height:100vh;
}

.bg{
position:fixed;
inset:0;
background:
radial-gradient(circle at top left,#334155,transparent 35%),
radial-gradient(circle at bottom right,#0ea5e9,transparent 35%),
#020617;
z-index:-1;
}

.container{
max-width:480px;
margin:auto;
padding:20px;
}

.card{
background:rgba(255,255,255,.08);
border:1px solid rgba(255,255,255,.1);
backdrop-filter:blur(6px);
-webkit-backdrop-filter:blur(6px);
border-radius:24px;
padding:20px;
margin-bottom:20px;
}

.profile-row{
display:flex;
align-items:center;
gap:16px;
}

.avatar{
width:80px;
height:80px;
border-radius:50%;
object-fit:cover;
border:2px solid rgba(255,255,255,.15);
}

h1{
font-size:28px;
font-weight:700;
margin-bottom:4px;
}

.subtitle{
opacity:.8;
font-size:14px;
}

.social{
display:flex;
gap:12px;
margin-top:18px;
flex-wrap:wrap;
}

.social a{
width:44px;
height:44px;
display:flex;
align-items:center;
justify-content:center;
border-radius:14px;
background:rgba(255,255,255,.08);
color:#fff;
text-decoration:none;
font-size:13px;
font-weight:700;
transition:.2s;
}

.social a:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.15);
}

.links{
display:flex;
flex-direction:column;
gap:14px;
}

.link-btn{
display:flex;
align-items:center;
justify-content:center;
padding:16px;
border-radius:18px;
background:rgba(255,255,255,.08);
text-decoration:none;
color:#fff;
font-weight:600;
transition:.2s;
}

.link-btn:hover{
transform:translateY(-2px);
background:rgba(255,255,255,.14);
}

.section-title{
font-size:20px;
font-weight:700;
margin-bottom:16px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

.grid img{
width:100%;
aspect-ratio:1/1;
object-fit:cover;
border-radius:18px;
display:block;
}

.footer{
text-align:center;
opacity:.6;
font-size:13px;
padding:10px 0 20px;
}

@media(max-width:480px){

.container{
padding:16px;
}

.card{
padding:18px;
border-radius:20px;
}

}

</style>
